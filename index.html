<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobCracker | India's Official Govt Job Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    </head>
<body class="bg-gray-50 text-gray-900">

    <header class="bg-blue-800 text-white p-5 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-extrabold tracking-wider">JobCracker 🇮🇳</h1>
            <p class="text-sm font-semibold bg-blue-700 px-3 py-1 rounded">100% Official Links Only</p>
        </div>
    </header>

    <section class="container mx-auto mt-6 p-4">
        <div class="bg-white p-4 rounded-lg shadow border border-gray-200 grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">State / Region</label>
                <select id="stateFilter" class="w-full p-2 border rounded outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="All">All India & States</option>
                    <option value="Central">Central Govt (UPSC, SSC, RRB)</option>
                    <option value="Andhra Pradesh">Andhra Pradesh</option>
                    <option value="Telangana">Telangana</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Job Classification</label>
                <select id="groupFilter" class="w-full p-2 border rounded outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="All">All Groups (A, B, C, D)</option>
                    <option value="Group A">Group A (Gazetted/Policy)</option>
                    <option value="Group B">Group B (Supervisory)</option>
                    <option value="Group C">Group C (Clerical/Asst)</option>
                    <option value="Group D">Group D (Support/Manual)</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Search Keywords</label>
                <input type="text" id="searchInput" placeholder="Ex: Police, Assistant..." class="w-full p-2 border rounded outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>
    </section>

    <main class="container mx-auto p-4 mt-2">
        <h2 class="text-xl font-bold mb-4 border-l-4 border-blue-800 pl-2">Active Notifications</h2>
        <div id="jobs-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
            </div>
    </main>

    <script>
        let allJobs =;

        // Fetch data from GitHub JSON (High-Concurrency, Zero DB Load)
        fetch('jobs.json')
           .then(response => response.json())
           .then(data => {
                allJobs = data;
                displayJobs(allJobs);
            });

        function displayJobs(jobs) {
            const container = document.getElementById('jobs-container');
            container.innerHTML = '';

            if (jobs.length === 0) {
                container.innerHTML = '<p class="text-gray-500">No active jobs found for this filter.</p>';
                return;
            }

            jobs.forEach(job => {
                const card = `
                    <div class="bg-white rounded-lg shadow-sm hover:shadow-lg border border-gray-200 transition p-5 flex flex-col justify-between h-full">
                        <div>
                            <div class="flex justify-between items-start mb-2">
                                <span class="bg-green-100 text-green-800 text-xs font-bold px-2 py-1 rounded">${job.state}</span>
                                <span class="bg-blue-100 text-blue-800 text-xs font-bold px-2 py-1 rounded">${job.category}</span>
                            </div>
                            <h3 class="text-lg font-bold text-gray-900 mb-1">${job.title}</h3>
                            <p class="text-sm font-semibold text-red-600 mb-4">Last Date: ${job.last_date}</p>
                        </div>
                        <a href="${job.link}" target="_blank" rel="noopener noreferrer" class="text-center w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-2 rounded transition">
                            Apply on Official Site
                        </a>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        // Fast Client-Side Filtering (Zero Server Lag)
        function filterJobs() {
            const stateText = document.getElementById('stateFilter').value;
            const groupText = document.getElementById('groupFilter').value;
            const searchText = document.getElementById('searchInput').value.toLowerCase();

            const filtered = allJobs.filter(job => {
                const matchState = (stateText === 'All') |

| (job.state === stateText);
                const matchGroup = (groupText === 'All') |

| (job.category.includes(groupText));
                const matchSearch = job.title.toLowerCase().includes(searchText);
                return matchState && matchGroup && matchSearch;
            });

            displayJobs(filtered);
        }

        document.getElementById('stateFilter').addEventListener('change', filterJobs);
        document.getElementById('groupFilter').addEventListener('change', filterJobs);
        document.getElementById('searchInput').addEventListener('input', filterJobs);
    </script>
</body>
</html>
